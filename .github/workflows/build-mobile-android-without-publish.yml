name: Build Mobile Android (Without Publish)

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'packages/filen-mobile/**'
      - 'packages/filen-utils/**'

concurrency:
  group: build-mobile-android-without-publish
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_ENV: production
  APP_ENV: production
  # Inlined into the JS bundle by Metro (EXPO_PUBLIC_*); encrypts the secureStore MMKV fallback used
  # when the OS keychain is unavailable. Missing it crashes the app at launch (SecureStore
  # constructor throws). Set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret.
  EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY: ${{ secrets.SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY }}

jobs:
  build-android-without-publish:
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/filen-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Write fallback encryption key to .env
        run: |
          if [ -z "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" ]; then
            echo "::error::EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY is empty - set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret"
            exit 1
          fi
          # @expo/env loads packages/filen-mobile/.env (the run working-directory) at Metro bundle time,
          # so EXPO_PUBLIC_* is inlined reliably even if the env var doesn't propagate into the native
          # build's bundling subprocess. .env is gitignored; the always() Cleanup step removes it.
          printf 'EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY=%s\n' "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" > .env

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-20
          components: rust-src
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          # cargo-ndk 4.x required: filen-rs heif-decoder/build.rs reads ANDROID_ABI (d454f4d); 3.5.4 set CARGO_NDK_ANDROID_TARGET (reverses bbqsrc/cargo-ndk#181)
          tool: cargo-ndk@4.1.2

      - name: Install dependencies
        run: npm install --force --include=dev && npx -y patch-package --patch-dir ./patches

      - name: Set up Expo credentials
        run: echo "${{ secrets.EXPO_CREDENTIALS }}" | base64 --decode > credentials.json

      - name: Prebuild
        run: npm run prebuild:ci:android

      - name: Build Android release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew app:assembleRelease
          cd ..

      - name: Cleanup
        if: always()
        run: |
          # Remove the .env holding the fallback encryption key
          rm -f .env
          rm -f android/app/release.keystore
          rm -f credentials.json

      - name: Publish APK to rolling GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach the signed release APK to a rolling prerelease so it can be tapped-to-install
          # directly on a phone. GitHub artifact downloads are always zipped; release assets are not.
          APK=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "${RUNNER_TEMP}/Filen-android.apk"
          gh release delete android-test-latest --cleanup-tag --yes || true
          gh release create android-test-latest \
            "${RUNNER_TEMP}/Filen-android.apk" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            --title "Android test build (latest)" \
            --notes "Rolling latest signed release APK for on-device testing. Build #${{ github.run_number }} · commit ${GITHUB_SHA}. On your phone, tap **Filen-android.apk** below to install (allow 'install unknown apps' if prompted)."
          {
            echo "## Android test build published"
            echo ""
            echo "Install on your phone from the [latest release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-test-latest) — tap **Filen-android.apk**. Build #${{ github.run_number }}."
          } >> "$GITHUB_STEP_SUMMARY"
