name: Build Mobile iOS (Simulator, Without Publish)

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'packages/filen-mobile/**'
      - 'packages/filen-utils/**'

concurrency:
  group: build-mobile-ios-without-publish
  cancel-in-progress: true

env:
  NODE_ENV: production
  APP_ENV: production
  # Inlined into the JS bundle by Metro (EXPO_PUBLIC_*); encrypts the secureStore MMKV fallback used
  # when the OS keychain is unavailable. Missing it crashes the app at launch (SecureStore
  # constructor throws). Set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret.
  EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY: ${{ secrets.SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY }}

jobs:
  build-ios-without-publish:
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/filen-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Verify fallback encryption key secret is present
        run: |
          if [ -z "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" ]; then
            echo "::error::EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY is empty - set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret"
            exit 1
          fi

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-20
          components: rust-src
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install --force --include=dev && npx -y patch-package --patch-dir ./patches

      - name: Prebuild
        run: npm run prebuild:ci:ios

      - name: Build iOS app for simulator
        run: |
          cd ios
          xcodebuild \
            -workspace Filen.xcworkspace \
            -scheme Filen \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            ARCHS=arm64 \
            build

      - name: Upload iOS simulator .app bundle
        uses: actions/upload-artifact@v6
        with:
          name: ios-simulator-app-test-${{ github.run_number }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Release-iphonesimulator/Filen.app
          retention-days: 90

      - name: Build summary
        run: |
          echo "## iOS Simulator Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "$RUNNER_TEMP/DerivedData/Build/Products/Release-iphonesimulator/Filen.app" ]; then
            echo "- iOS Simulator .app bundle: Filen.app" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab above. Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
