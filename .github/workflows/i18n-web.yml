name: i18n translate (web)

# Parametrized port of `i18n-translate.yml` (filen-mobile's auto-translate workflow) targeting
# `packages/filen-web` — mechanism mirrored 1:1 (checkout -> install -> run the translation
# pipeline -> open/update one rolling PR), only the working-directory / branch / concurrency-group
# names are package-specific.
#
# TRIGGER: workflow_dispatch ONLY for now. Mobile's push
# trigger — `paths: ['packages/filen-mobile/src/locales/en/**']` — deliberately watches only the
# EN source (target-language JSON catalogs + the snapshot are workflow OUTPUTS, not triggers, or
# every run would fire on its own commit). The filen-web equivalent
# (`packages/filen-web/src/locales/en/**`) plus the full 27-language target set (mobile parity)
# stay disabled until the translation pipeline is fully wired and shell/auth keys have
# stabilized — until then this is manual-dispatch-only scaffolding.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Translation mode'
        type: choice
        required: true
        default: 'delta'
        options:
          - delta
          - full

permissions:
  contents: write
  pull-requests: write

# Own group — deliberately NOT the same string as i18n-translate.yml's `i18n-translate-${{
# github.ref }}`. Concurrency groups are repo-global (not scoped per workflow file), so reusing
# mobile's exact group name would let a web dispatch cancel an in-flight MOBILE translation run
# (or vice versa) purely by sharing a ref.
concurrency:
  group: i18n-translate-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    # Always-true today (the only trigger is workflow_dispatch) — kept pre-staged so the fork
    # guard is already in place once the push trigger is enabled, mirroring
    # i18n-translate.yml's own guard exactly.
    if: github.event_name == 'workflow_dispatch' || github.repository == github.event.repository.full_name
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The DELTA baseline is a committed snapshot file, not git history, so a shallow
          # checkout is fine — kept at 2 (harmless) rather than 1 to avoid disturbing the PR step.
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: packages/filen-web
        run: npm install --force --include=dev && npx -y patch-package  --patch-dir ./patches

      # `translate-i18n` (packages/filen-web/scripts/translate-i18n.ts + a matching package.json
      # script, mirroring filen-mobile's own copy) does not exist in filen-web yet — it lands
      # alongside the multi-language catalog infra (SUPPORTED_LANGUAGES + per-language JSON
      # stubs) and requires a translate-i18n script port before first dispatch. This step mirrors
      # i18n-translate.yml's invocation shape so wiring the real script later is a drop-in, not a
      # workflow rewrite — a dispatch run today would fail here until that script lands.
      - name: Run translation pipeline
        working-directory: packages/filen-web
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # `inputs.mode` is a workflow_dispatch choice restricted to delta|full, so it can never
          # carry arbitrary text. Resolved to a flag in env, then passed via a quoted shell
          # variable — no untrusted value is interpolated into the run line.
          TRANSLATE_FLAG: ${{ inputs.mode == 'full' && '--full' || '' }}
        run: npm run translate-i18n -- "$TRANSLATE_FLAG"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          # FIXED branch, distinct from mobile's `i18n/auto-translate` — a second package's
          # rolling PR must use its own fixed name or the two workflows' PRs collide on the same
          # branch.
          branch: i18n/auto-translate-web
          delete-branch: true
          commit-message: 'i18n: update web translations'
          title: 'i18n: update web translations'
          labels: |
            i18n
            automated
          body: |
            ## Automated translation update (filen-web)

            This PR was generated by the **i18n translate (web)** workflow
            (`packages/filen-web/scripts/translate-i18n.ts`), dispatched manually — the push
            trigger + full language set stay disabled until the translation pipeline is fully wired.

            The target-language catalogs (`packages/filen-web/src/locales/<lang>.json`) were
            (re)generated from the English source catalog.

            **These translations are machine-generated and need human review** before merging —
            check placeholders (`{{...}}`), markup, plural forms, and tone.

            > Note: PRs opened by the workflow's `GITHUB_TOKEN` do not trigger downstream CI
            > (lint / typecheck / tests). Merging this PR by hand runs the full CI on `main`.
