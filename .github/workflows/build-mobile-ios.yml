name: Build Mobile iOS

on:
  workflow_dispatch:
  # Also build + publish when a version tag is pushed, e.g. `filen-mobile@4.0.9`. The built
  # version comes from app.config.ts (VERSION) via prebuild, NOT from the tag — the tag is only a
  # trigger. The "Verify tag matches app version" step below fails fast if the tag and
  # app.config.ts disagree, so a tag can never publish a stale version.
  push:
    tags:
      # Any `filen-mobile@…` tag triggers; the "Verify tag matches app version" step is the real
      # validator (a tag whose version != app.config.ts VERSION fails fast before building).
      - 'filen-mobile@*'

concurrency:
  # Queue (don't cancel) publish runs so a tag push and a manual dispatch can't upload to
  # TestFlight simultaneously; an in-flight upload is never interrupted mid-way.
  group: build-mobile-ios
  cancel-in-progress: false

env:
  NODE_ENV: production
  APP_ENV: production
  # Inlined into the JS bundle by Metro (EXPO_PUBLIC_*); encrypts the secureStore MMKV fallback used
  # when the OS keychain is unavailable. Missing it crashes the app at launch (SecureStore
  # constructor throws). Set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret.
  EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY: ${{ secrets.SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY }}

jobs:
  build-ios:
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/filen-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Tag-triggered runs only: the built version comes from app.config.ts, so refuse to publish
      # if the pushed tag disagrees with it (prevents `filen-mobile@4.0.9` shipping a stale 4.0.8).
      # GITHUB_REF_NAME is read as an env var, never interpolated into the script.
      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#filen-mobile@}"
          APP_VERSION="$(grep -oE 'const VERSION: string = "[0-9]+\.[0-9]+\.[0-9]+"' app.config.ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "Tag: ${GITHUB_REF_NAME} (version ${TAG_VERSION}) | app.config.ts VERSION: ${APP_VERSION:-<unparsed>}"
          if [ -z "${APP_VERSION}" ]; then
            echo "::error::Could not parse VERSION from app.config.ts"
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app.config.ts VERSION (${APP_VERSION}). Bump VERSION to ${TAG_VERSION} (or retag) before publishing."
            exit 1
          fi

      - name: Write fallback encryption key to .env
        run: |
          if [ -z "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" ]; then
            echo "::error::EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY is empty - set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret"
            exit 1
          fi
          # @expo/env loads packages/filen-mobile/.env (the run working-directory) at Metro bundle time,
          # so EXPO_PUBLIC_* is inlined reliably even if the env var doesn't propagate into the native
          # build's bundling subprocess. .env is gitignored; the always() Cleanup step removes it.
          printf 'EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY=%s\n' "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" > .env

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Set up distribution certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          create-keychain: true
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASS }}

      - name: Set up development certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          create-keychain: false
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.APPLE_DEVELOPMENT_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPMENT_CERT_PASS }}

      - name: Set up App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-20
          components: rust-src
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install --force --include=dev && npx -y patch-package --patch-dir ./patches

      - name: Prebuild
        run: npm run prebuild:ci:ios

      - name: Build and archive iOS app
        run: |
          cd ios
          xcodebuild \
            -workspace Filen.xcworkspace \
            -scheme Filen \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/Filen.xcarchive \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            archive

      - name: Export IPA
        run: |
          # Create export options plist for automatic signing
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Filen.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates

      - name: Cleanup
        if: always()
        run: |
          # Remove the .env holding the fallback encryption key
          rm -f .env

          # Remove API key
          rm -rf ~/.appstoreconnect

          # Clear Xcode derived data and caches
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/com.apple.dt.Xcode

          # Clear provisioning profiles downloaded by the action
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles

          # Keychain deletion is intentionally NOT done here: import-codesign-certs
          # (create-keychain: true) deletes its signing_temp keychain in its own post-job
          # hook, which hard-fails the job with "keychain could not be found" (exit 50)
          # if this step already deleted it.

      - name: Upload iOS archive
        uses: actions/upload-artifact@v6
        with:
          name: ios-archive-${{ github.run_number }}
          path: ${{ runner.temp }}/Filen.xcarchive
          retention-days: 90

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ${{ runner.temp }}/*.ipa
          retention-days: 90

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ runner.temp }}/Filen.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          # The upload completes before the processing wait; the action's API token is minted once
          # and expires during slow App Store processing, failing the job after a successful
          # upload (401 NOT_AUTHORIZED). Nothing downstream needs the wait - testers are assigned
          # manually and encryption compliance is declared in the Info.plist.
          wait-for-processing: 'false'

      - name: Build summary
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built artifacts" >> $GITHUB_STEP_SUMMARY

          if [ -d "$RUNNER_TEMP/Filen.xcarchive" ]; then
            echo "- iOS Archive (.xcarchive)" >> $GITHUB_STEP_SUMMARY
          fi

          if ls $RUNNER_TEMP/*.ipa 1> /dev/null 2>&1; then
            IPA_FILE=$(ls $RUNNER_TEMP/*.ipa | head -n 1)
            IPA_SIZE=$(du -h "$IPA_FILE" | cut -f1)
            IPA_NAME=$(basename "$IPA_FILE")
            echo "- iOS IPA: $IPA_NAME (${IPA_SIZE})" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "- Build uploaded to App Store Connect. After processing, assign it to TestFlight testers manually." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab above. Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
