name: Tests

on:
  workflow_dispatch:

  push:
    paths:
      - 'packages/filen-utils/**'
      - 'packages/filen-mobile/**'

  pull_request:
    paths:
      - 'packages/filen-utils/**'
      - 'packages/filen-mobile/**'

concurrency:
  group: 'tests'
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      filen-utils: ${{ steps.filter.outputs.filen-utils }}
      filen-mobile: ${{ steps.filter.outputs.filen-mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            filen-utils:
              - 'packages/filen-utils/**'
            filen-mobile:
              - 'packages/filen-mobile/**'

  test-utils:
    needs: changes
    if: needs.changes.outputs.filen-utils == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: packages/filen-utils/package-lock.json
      - name: Install dependencies
        working-directory: packages/filen-utils
        run: npm install --package-lock-only --no-workspaces && npm ci
      - name: Test
        working-directory: packages/filen-utils
        run: npm test
  test-mobile:
    needs: changes
    if: needs.changes.outputs.filen-mobile == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: packages/filen-mobile/package-lock.json
      - name: Install patch-package
        run: npm install -g patch-package
      - name: Install dependencies
        working-directory: packages/filen-mobile
        run: npm install --package-lock-only --no-workspaces && npm ci
      - name: Test
        working-directory: packages/filen-mobile
        run: npm test
