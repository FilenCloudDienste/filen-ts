name: Tests

on:
  workflow_dispatch:

  push:
    paths:
      - 'packages/filen-utils/**'
      - 'packages/filen-mobile/**'
      - 'packages/filen-web/**'

  pull_request:
    paths:
      - 'packages/filen-utils/**'
      - 'packages/filen-mobile/**'
      - 'packages/filen-web/**'

concurrency:
  group: 'tests'
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      filen-utils: ${{ steps.filter.outputs.filen-utils }}
      filen-mobile: ${{ steps.filter.outputs.filen-mobile }}
      filen-web: ${{ steps.filter.outputs.filen-web }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            filen-utils:
              - 'packages/filen-utils/**'
            filen-mobile:
              - 'packages/filen-mobile/**'
            filen-web:
              - 'packages/filen-web/**'

  test-utils:
    needs: changes
    if: needs.changes.outputs.filen-utils == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: packages/filen-utils
        run: npm install --force --include=dev && npx -y patch-package  --patch-dir ./patches
      - name: Test
        working-directory: packages/filen-utils
        run: npm test
  test-mobile:
    needs: changes
    if: needs.changes.outputs.filen-mobile == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: packages/filen-mobile
        run: npm install --force --include=dev && npx -y patch-package  --patch-dir ./patches
      - name: Test
        working-directory: packages/filen-mobile
        run: npm test
  test-web:
    needs: changes
    if: needs.changes.outputs.filen-web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      # The Vite production build (SDK wasm + full module graph) needs more than the default heap.
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: packages/filen-web
        run: npm ci
      - name: Check generated error kinds are up to date
        working-directory: packages/filen-web
        run: npm run gen:error-kinds && git diff --exit-code
      - name: React Compiler healthcheck
        working-directory: packages/filen-web
        run: npm run check:compiler
      - name: Unit tests
        working-directory: packages/filen-web
        run: npm run test
      - name: Install Playwright browsers
        working-directory: packages/filen-web
        run: npx playwright install --with-deps chromium firefox webkit
      - name: E2E tests
        working-directory: packages/filen-web
        run: VITE_E2E=1 npm run test:e2e
        env:
          FILEN_WEB_E2E_TEST_EMAIL: ${{ secrets.FILEN_WEB_E2E_TEST_EMAIL }}
          FILEN_WEB_E2E_TEST_PASSWORD: ${{ secrets.FILEN_WEB_E2E_TEST_PASSWORD }}
      - name: Assert e2e hooks are absent from a production build
        working-directory: packages/filen-web
        run: |
          npm run build
          if grep -rq 'filenE2E\|filen.e2e.session' dist; then
            echo 'E2E hooks leaked into the production build'
            exit 1
          fi
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: packages/filen-web/playwright-report
          retention-days: 14
