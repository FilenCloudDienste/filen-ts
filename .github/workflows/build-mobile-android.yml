name: Build Mobile Android

on:
  workflow_dispatch:
  # Also build + publish when a version tag is pushed, e.g. `filen-mobile@4.0.9`. The built
  # version comes from app.config.ts (VERSION) via prebuild, NOT from the tag — the tag is only a
  # trigger. The "Verify tag matches app version" step below fails fast if the tag and
  # app.config.ts disagree, so a tag can never publish a stale version.
  push:
    tags:
      # Any `filen-mobile@…` tag triggers; the "Verify tag matches app version" step is the real
      # validator (a tag whose version != app.config.ts VERSION fails fast before building).
      - "filen-mobile@*"

concurrency:
  # Queue (don't cancel) publish runs so a tag push and a manual dispatch can't upload to the
  # store simultaneously; an in-flight upload is never interrupted mid-way.
  group: build-mobile-android
  cancel-in-progress: false

permissions:
  # Needed for the "Attach the signed APK to the GitHub release" step (gh release create/upload).
  contents: write

env:
  NODE_ENV: production
  APP_ENV: production
  # Inlined into the JS bundle by Metro (EXPO_PUBLIC_*); encrypts the secureStore MMKV fallback used
  # when the OS keychain is unavailable. Missing it crashes the app at launch (SecureStore
  # constructor throws). Set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret.
  EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY: ${{ secrets.SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY }}

jobs:
  build-android:
    runs-on: macos-26
    defaults:
      run:
        working-directory: packages/filen-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # Tag-triggered runs only: the built version comes from app.config.ts, so refuse to publish
      # if the pushed tag disagrees with it (prevents `filen-mobile@4.0.9` shipping a stale 4.0.8).
      # GITHUB_REF_NAME is read as an env var, never interpolated into the script.
      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#filen-mobile@}"
          APP_VERSION="$(grep -oE 'const VERSION: string = "[0-9]+\.[0-9]+\.[0-9]+"' app.config.ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "Tag: ${GITHUB_REF_NAME} (version ${TAG_VERSION}) | app.config.ts VERSION: ${APP_VERSION:-<unparsed>}"
          if [ -z "${APP_VERSION}" ]; then
            echo "::error::Could not parse VERSION from app.config.ts"
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app.config.ts VERSION (${APP_VERSION}). Bump VERSION to ${TAG_VERSION} (or retag) before publishing."
            exit 1
          fi

      - name: Write fallback encryption key to .env
        run: |
          if [ -z "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" ]; then
            echo "::error::EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY is empty - set the SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY org/repo secret"
            exit 1
          fi
          # @expo/env loads packages/filen-mobile/.env (the run working-directory) at Metro bundle time,
          # so EXPO_PUBLIC_* is inlined reliably even if the env var doesn't propagate into the native
          # build's bundling subprocess. .env is gitignored; the always() Cleanup step removes it.
          printf 'EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY=%s\n' "${EXPO_PUBLIC_SECURE_STORE_UNSECURE_FALLBACK_ENCRYPTION_KEY}" > .env

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-20
          components: rust-src
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          # cargo-ndk 4.x required: filen-rs heif-decoder/build.rs reads ANDROID_ABI (d454f4d); 3.5.4 set CARGO_NDK_ANDROID_TARGET (reverses bbqsrc/cargo-ndk#181)
          tool: cargo-ndk@4.1.2

      - name: Install dependencies
        run: npm install --force --include=dev && npx -y patch-package --patch-dir ./patches

      - name: Set up Expo credentials
        run: echo "${{ secrets.EXPO_CREDENTIALS }}" | base64 --decode > credentials.json

      - name: Prebuild
        run: npm run prebuild:ci:android

      - name: Build Android release APK & AAB
        run: cd android && chmod +x ./gradlew && ./gradlew app:bundleRelease app:assembleRelease && cd ..

      - name: Cleanup
        if: always()
        run: |
          # Remove the .env holding the fallback encryption key
          rm -f .env
          rm -f android/app/release.keystore
          rm -f credentials.json

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: android-release-apk-${{ github.run_number }}
          path: packages/filen-mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB
        uses: actions/upload-artifact@v6
        with:
          name: android-release-aab-${{ github.run_number }}
          path: packages/filen-mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      # Tag-triggered runs only: Google Play carries the AAB, but the signed APK is directly
      # installable, so attach it to this tag's GitHub release for side-loading. Runs before the
      # Play upload so the download is available even if the store submission later fails.
      - name: Attach the signed APK to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Create the release for this tag if it doesn't exist yet (notes can be edited afterwards),
          # then attach the APK under a version-stamped name. --clobber lets a re-run replace it.
          VERSION="${GITHUB_REF_NAME#filen-mobile@}"
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::Release APK not found at $APK"
            exit 1
          fi
          cp "$APK" "${RUNNER_TEMP}/Filen-${VERSION}.apk"
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag
          gh release upload "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/Filen-${VERSION}.apk" --clobber

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          packageName: io.filen.app
          releaseFiles: packages/filen-mobile/android/app/build/outputs/bundle/release/app-release.aab
          tracks: internal

      - name: Build summary
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built artifacts" >> $GITHUB_STEP_SUMMARY

          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            APK_SIZE=$(du -h "android/app/build/outputs/apk/release/app-release.apk" | cut -f1)
            echo "- Release APK (${APK_SIZE})" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            AAB_SIZE=$(du -h "android/app/build/outputs/bundle/release/app-release.aab" | cut -f1)
            echo "- Release AAB (${AAB_SIZE})" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab above. Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
