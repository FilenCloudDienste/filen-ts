name: i18n translate

on:
  push:
    branches:
      - main
    paths:
      - 'packages/filen-mobile/src/locales/en/**'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Translation mode'
        type: choice
        required: true
        default: 'delta'
        options:
          - delta
          - full

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    # Fork guard: run on workflow_dispatch (canonical repo only — dispatch isn't available on
    # forks), or on push events that originate from the canonical repository. Fork PRs never
    # receive secrets, but this is explicit belt-and-suspenders so the job never even starts there.
    if: github.event_name == 'workflow_dispatch' || github.repository == github.event.repository.full_name
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth 2 so the DELTA mode can `git diff HEAD~1` against the previous commit.
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: packages/filen-mobile
        run: npm install --force --include=dev && npx -y patch-package  --patch-dir ./patches

      - name: Run translation pipeline
        working-directory: packages/filen-mobile
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # `inputs.mode` is a workflow_dispatch choice restricted to delta|full (empty on push),
          # so it can never carry arbitrary text. Resolved to a flag in env, then passed via a
          # quoted shell variable — no untrusted value is interpolated into the run line.
          TRANSLATE_FLAG: ${{ inputs.mode == 'full' && '--full' || '' }}
        run: npm run translate-i18n -- "$TRANSLATE_FLAG"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: i18n/auto-translate-${{ github.run_id }}
          delete-branch: true
          commit-message: 'i18n: update translations'
          title: 'i18n: update translations'
          labels: |
            i18n
            automated
          body: |
            ## Automated translation update

            This PR was generated by the **i18n translate** workflow
            (`scripts/translate-i18n.ts`, model `claude-opus-4-8`).

            The target-language catalogs (`packages/filen-mobile/src/locales/<lang>.json`)
            were (re)generated from the English source catalog.

            **These translations are machine-generated and need human review** before merging —
            check placeholders (`{{...}}`), `<link>…</link>` markup, plural forms, and tone.

            > Note: PRs opened by the workflow's `GITHUB_TOKEN` do not trigger downstream CI
            > (lint / typecheck / tests). Merging this PR by hand runs the full CI on `main`.
