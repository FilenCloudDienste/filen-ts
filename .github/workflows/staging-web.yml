# Dormant until the web app is finished; deploy wiring is manual (docs/infra/nginx.conf).
# Builds the app and uploads dist/ as an artifact — no automatic deploy, dispatch-only.
name: Build staging web artifact

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'staging-web'
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  staging-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: packages/filen-web
        run: npm ci
      - name: Build
        working-directory: packages/filen-web
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filen-web-dist
          path: packages/filen-web/dist
